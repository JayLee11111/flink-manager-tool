<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flink Manager - 告警配置</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px; font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fb; color: #1f2329; }
    .container { max-width: 1000px; margin: 0 auto; }
    .nav { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .nav a { text-decoration: none; padding: 8px 12px; border-radius: 8px; border: 1px solid #d0d5dd; color: #344054; background: #fff; }
    .nav a.active { background: #1677ff; color: #fff; border-color: #1677ff; }
    .card { background: #fff; border: 1px solid #e6e8eb; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    input, select { height: 40px; border: 1px solid #d0d5dd; border-radius: 8px; padding: 0 12px; font-size: 14px; background: #fff; }
    .w-160 { width: 160px; }
    .w-180 { width: 180px; }
    .w-220 { width: 220px; }
    .flex-1 { flex: 1; min-width: 220px; }
    button { height: 40px; border: 0; border-radius: 8px; padding: 0 14px; cursor: pointer; }
    .btn-primary { background: #1677ff; color: #fff; }
    .btn-toggle { background: #f59e0b; color: #fff; height: 34px; margin-right: 8px; }
    .btn-delete { background: #ef4444; color: #fff; height: 34px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
    th, td { border-bottom: 1px solid #eef0f3; padding: 12px 8px; text-align: left; word-break: break-all; }
    th { color: #475467; font-weight: 600; background: #fafafa; }
    .empty { color: #98a2b3; text-align: center; padding: 18px 0; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; border: 1px solid #d0d5dd; }
    .tag.enabled { color: #166534; background: #dcfce7; border-color: #86efac; }
    .tag.disabled { color: #991b1b; background: #fee2e2; border-color: #fca5a5; }
    .sev { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; border: 1px solid; }
    .sev.P1 { color: #7f1d1d; background: #fee2e2; border-color: #fca5a5; }
    .sev.P2 { color: #78350f; background: #fef3c7; border-color: #fcd34d; }
    .sev.P3 { color: #1e3a8a; background: #dbeafe; border-color: #93c5fd; }
    .record-ok { color: #166534; }
    .record-failed { color: #991b1b; }
    textarea { width: 100%; min-height: 220px; border: 1px solid #d0d5dd; border-radius: 8px; padding: 10px 12px; font-size: 13px; resize: vertical; background: #fff; }
    .hint { margin-top: 8px; color: #667085; font-size: 12px; }
    .btn-import { background: #2563eb; color: #fff; }
    .btn-load-sample { background: #475467; color: #fff; }
    .import-result { margin-top: 10px; font-size: 13px; color: #166534; }
    .import-result.error { color: #991b1b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="./index.html">总览</a>
      <a href="./clusters.html">集群管理</a>
      <a href="./jobs.html">Job 管理</a>
      <a class="active" href="./alerts.html">告警配置</a>
    </div>

    <div class="card">
      <h1 style="margin:0 0 12px; font-size:24px;">告警配置</h1>
      <div class="form-row">
        <input id="alertName" class="w-220" placeholder="告警名称" />
        <select id="alertType" class="w-180">
          <option value="JOB_FAILED">Job 失败</option>
          <option value="CLUSTER_UNREACHABLE">集群不可达</option>
        </select>
        <select id="severity" class="w-160">
          <option value="P1">P1</option>
          <option value="P2">P2</option>
          <option value="P3">P3</option>
        </select>
        <select id="notifyType" class="w-160">
          <option value="EMAIL">Email</option>
          <option value="WEBHOOK">Webhook</option>
        </select>
        <input id="notifyTarget" class="flex-1" placeholder="通知目标（邮箱或 webhook 地址）" />
      </div>
      <div class="form-row" style="margin-top:10px;">
        <input id="rule" class="flex-1" placeholder="规则条件（例如：连续失败 3 次）" />
        <button id="addAlertBtn" class="btn-primary">添加告警</button>
      </div>
    </div>

    <div class="card">
      <h2 style="margin:0 0 8px; font-size:18px;">监控配置 JSON 导入</h2>
      <textarea id="monitorConfigJson" placeholder="粘贴监控配置 JSON（包含 preSubject/clusterPreSubject/address/clusters）"></textarea>
      <div class="form-row" style="margin-top:10px;">
        <button id="importConfigBtn" class="btn-import">导入并合并监控对象</button>
        <button id="loadSampleBtn" class="btn-load-sample">填充示例</button>
      </div>
      <div class="hint">
        导入后将按集群名合并：同名集群会用新配置全量替换其下 Job（含新增/删除），其他集群和 Job 保留不变。
      </div>
      <div id="importResult" class="import-result"></div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th style="width: 14%;">名称</th>
            <th style="width: 14%;">类型</th>
            <th style="width: 8%;">级别</th>
            <th style="width: 10%;">通知方式</th>
            <th style="width: 20%;">通知目标</th>
            <th>规则</th>
            <th style="width: 8%;">状态</th>
            <th style="width: 170px;">操作</th>
          </tr>
        </thead>
        <tbody id="alertBody"></tbody>
      </table>
    </div>

    <div class="card">
      <h2 style="margin:0 0 8px; font-size:18px;">最近触发记录</h2>
      <table>
        <thead>
          <tr>
            <th style="width: 20%;">时间</th>
            <th style="width: 20%;">告警名</th>
            <th style="width: 10%;">级别</th>
            <th>对象</th>
            <th style="width: 12%;">状态</th>
          </tr>
        </thead>
        <tbody id="recordBody"></tbody>
      </table>
    </div>
  </div>

  <script src="./data-access.js"></script>
  <script>
    const ALERT_KEY = "flink_alerts_v1";
    const CLUSTER_KEY = "flink_clusters_v1";
    const JOB_KEY = "flink_jobs_v1";
    const ALERT_RECORD_KEY = "flink_alert_records_v1";
    const ALERT_MONITOR_CONFIG_KEY = "flink_alert_monitor_config_v1";
    const ALERT_RECORD_LIMIT = 100;

    const alertName = document.getElementById("alertName");
    const alertType = document.getElementById("alertType");
    const severity = document.getElementById("severity");
    const notifyType = document.getElementById("notifyType");
    const notifyTarget = document.getElementById("notifyTarget");
    const rule = document.getElementById("rule");
    const addAlertBtn = document.getElementById("addAlertBtn");
    const body = document.getElementById("alertBody");
    const recordBody = document.getElementById("recordBody");
    const monitorConfigJson = document.getElementById("monitorConfigJson");
    const importConfigBtn = document.getElementById("importConfigBtn");
    const loadSampleBtn = document.getElementById("loadSampleBtn");
    const importResult = document.getElementById("importResult");

    const SAMPLE_IMPORT_JSON = {
      preSubject: "[TECHLAB-MDM-ASIA-UAT-FLINK-JOB] Job exception list ",
      clusterPreSubject: "[TECHLAB-MDM-ASIA-UAT-FLINK-Cluster] Cluster down",
      address: "git.techlabmdmsupport@aswatson.com",
      mailGaps: "150",
      maxRetry: "10",
      retryGap: "60000",
      clusters: [
        {
          path: "http://example.com/flink/cluster-a",
          names: "JOB_A,JOB_B"
        },
        {
          path: "http://example.com/flink/cluster-b",
          names: "JOB_C"
        }
      ]
    };

    function load() {
      return window.DataAccess.load(ALERT_KEY);
    }

    function save(list) {
      return window.DataAccess.save(ALERT_KEY, list);
    }

    function saveClusters(list) {
      return window.DataAccess.save(CLUSTER_KEY, list);
    }

    function saveJobs(list) {
      return window.DataAccess.save(JOB_KEY, list);
    }

    function loadRecords() {
      const list = window.DataAccess.load(ALERT_RECORD_KEY);
      return Array.isArray(list) ? list : [];
    }

    function saveRecords(list) {
      const normalized = Array.isArray(list) ? list.slice(0, ALERT_RECORD_LIMIT) : [];
      return window.DataAccess.save(ALERT_RECORD_KEY, normalized);
    }

    function normalizeAlert(item) {
      return {
        name: item.name || "",
        type: item.type || "JOB_FAILED",
        severity: item.severity || "P2",
        notifyType: item.notifyType || "EMAIL",
        target: item.target || "",
        rule: item.rule || "",
        enabled: item.enabled !== false
      };
    }

    function renderAlertList() {
      const list = load().map(normalizeAlert);
      body.innerHTML = "";
      if (!list.length) {
        body.innerHTML = '<tr><td class="empty" colspan="8">暂无告警配置</td></tr>';
        return;
      }

      list.forEach((item, i) => {
        const tr = document.createElement("tr");
        const cls = item.enabled ? "enabled" : "disabled";
        const txt = item.enabled ? "启用" : "禁用";
        tr.innerHTML = `
          <td>${item.name || ""}</td>
          <td>${item.type || ""}</td>
          <td><span class="sev ${item.severity}">${item.severity}</span></td>
          <td>${item.notifyType || ""}</td>
          <td>${item.target || ""}</td>
          <td>${item.rule || "-"}</td>
          <td><span class="tag ${cls}">${txt}</span></td>
          <td>
            <button class="btn-toggle" data-toggle="${i}">${item.enabled ? "停用" : "启用"}</button>
            <button class="btn-delete" data-delete="${i}">删除</button>
          </td>
        `;
        body.appendChild(tr);
      });
    }

    function renderRecordList() {
      const records = loadRecords();
      recordBody.innerHTML = "";
      if (!records.length) {
        recordBody.innerHTML = '<tr><td class="empty" colspan="5">暂无触发记录</td></tr>';
        return;
      }

      records.forEach((item) => {
        const tr = document.createElement("tr");
        const status = item.status === "成功" ? "record-ok" : "record-failed";
        tr.innerHTML = `
          <td>${item.time || ""}</td>
          <td>${item.alertName || ""}</td>
          <td><span class="sev ${item.severity || "P2"}">${item.severity || "P2"}</span></td>
          <td>${item.target || ""}</td>
          <td class="${status}">${item.status || ""}</td>
        `;
        recordBody.appendChild(tr);
      });
    }

    function render() {
      renderAlertList();
      renderRecordList();
    }

    function appendRecord(alertItem, statusText) {
      const next = [{
        time: new Date().toLocaleString("zh-CN"),
        alertName: alertItem && alertItem.name ? alertItem.name : "",
        severity: alertItem && alertItem.severity ? alertItem.severity : "P2",
        target: alertItem && alertItem.target ? alertItem.target : "",
        status: statusText
      }].concat(loadRecords());
      saveRecords(next);
    }

    function normalizeBaseUrl(url) {
      return String(url || "").trim().replace(/\/+$/, "");
    }

    function buildClusterName(item, path) {
      const explicit = String(item && item.name || "").trim();
      if (explicit) return explicit;
      const base = normalizeBaseUrl(path);
      if (!base) return "";
      const segments = base.split("/").filter(Boolean);
      return segments[segments.length - 1] || base;
    }

    function splitJobNames(namesText) {
      return String(namesText || "")
        .split(",")
        .map((x) => x.trim())
        .filter(Boolean);
    }

    function setImportResult(text, isError) {
      importResult.textContent = text || "";
      importResult.className = isError ? "import-result error" : "import-result";
    }

    function upsertDefaultAlerts(importedAlerts) {
      if (!importedAlerts.length) return;
      const current = load();
      const map = {};
      current.forEach((item) => {
        const key = String(item.type || "") + "::" + String(item.name || "");
        map[key] = item;
      });
      importedAlerts.forEach((item) => {
        const key = String(item.type || "") + "::" + String(item.name || "");
        map[key] = item;
      });
      save(Object.keys(map).map((k) => map[k]));
    }

    function buildDefaultAlerts(config) {
      const target = String(config && config.address || "").trim();
      const preSubject = String(config && config.preSubject || "").trim();
      const clusterPreSubject = String(config && config.clusterPreSubject || "").trim();
      if (!target) return [];
      return [
        {
          name: preSubject || "Job 异常通知",
          type: "JOB_FAILED",
          severity: "P1",
          notifyType: "EMAIL",
          target: target,
          rule: "由监控配置 JSON 导入",
          enabled: true
        },
        {
          name: clusterPreSubject || "集群不可达通知",
          type: "CLUSTER_UNREACHABLE",
          severity: "P1",
          notifyType: "EMAIL",
          target: target,
          rule: "由监控配置 JSON 导入",
          enabled: true
        }
      ];
    }

    function importMonitorConfig() {
      const raw = monitorConfigJson.value.trim();
      if (!raw) {
        setImportResult("请先粘贴 JSON 配置。", true);
        return;
      }
      let config;
      try {
        config = JSON.parse(raw);
      } catch (_) {
        setImportResult("JSON 解析失败，请检查格式。", true);
        return;
      }

      const clustersInput = Array.isArray(config && config.clusters) ? config.clusters : [];
      if (!clustersInput.length) {
        setImportResult("JSON 缺少 clusters 列表。", true);
        return;
      }

      const importedClusterMap = {};
      const importedClusters = [];

      clustersInput.forEach((item) => {
        const path = normalizeBaseUrl(item && item.path);
        if (!path) return;
        const clusterName = buildClusterName(item, path);
        if (!clusterName) return;
        if (!importedClusterMap[clusterName]) {
          importedClusterMap[clusterName] = {
            name: clusterName,
            url: path,
            jobs: [],
            jobNameSet: {}
          };
          importedClusters.push(importedClusterMap[clusterName]);
        } else {
          importedClusterMap[clusterName].url = path;
        }

        const names = splitJobNames(item && item.names);
        names.forEach((jobName) => {
          if (!importedClusterMap[clusterName].jobNameSet[jobName]) {
            importedClusterMap[clusterName].jobNameSet[jobName] = true;
            importedClusterMap[clusterName].jobs.push(jobName);
          }
        });
      });

      if (!importedClusters.length) {
        setImportResult("未识别到有效集群 path。", true);
        return;
      }

      const existingClusters = window.DataAccess.load(CLUSTER_KEY) || [];
      const existingJobs = window.DataAccess.load(JOB_KEY) || [];
      const mergedClusterMap = {};
      existingClusters.forEach((item) => {
        if (!item || !item.name) return;
        mergedClusterMap[item.name] = item;
      });

      let addedClusters = 0;
      let updatedClusters = 0;
      importedClusters.forEach((cluster) => {
        if (mergedClusterMap[cluster.name]) {
          updatedClusters += 1;
          mergedClusterMap[cluster.name] = Object.assign({}, mergedClusterMap[cluster.name], {
            name: cluster.name,
            url: cluster.url
          });
        } else {
          addedClusters += 1;
          mergedClusterMap[cluster.name] = {
            name: cluster.name,
            url: cluster.url
          };
        }
      });

      const importedClusterNameSet = {};
      importedClusters.forEach((x) => { importedClusterNameSet[x.name] = true; });
      const retainedJobs = existingJobs.filter((item) => !importedClusterNameSet[String(item && item.cluster || "")]);
      const importedJobs = [];
      importedClusters.forEach((cluster) => {
        cluster.jobs.forEach((jobName) => {
          importedJobs.push({
            name: jobName,
            cluster: cluster.name,
            status: "UNKNOWN",
            remark: "from alert config",
            params: {}
          });
        });
      });
      const mergedJobs = retainedJobs.concat(importedJobs);

      saveClusters(Object.keys(mergedClusterMap).map((k) => mergedClusterMap[k]));
      saveJobs(mergedJobs);
      window.DataAccess.save(ALERT_MONITOR_CONFIG_KEY, {
        preSubject: String(config.preSubject || ""),
        clusterPreSubject: String(config.clusterPreSubject || ""),
        address: String(config.address || ""),
        mailGaps: String(config.mailGaps || ""),
        maxRetry: String(config.maxRetry || ""),
        retryGap: String(config.retryGap || "")
      });

      const nextAlerts = buildDefaultAlerts(config);
      upsertDefaultAlerts(nextAlerts);

      const replacedClusterJobs = existingJobs.length - retainedJobs.length;
      setImportResult(
        "导入成功：新增集群 " + addedClusters + " 个，更新同名集群 " + updatedClusters + " 个；替换 Job " +
        replacedClusterJobs + " 个，导入 Job " + importedJobs.length + " 个。"
      );
      render();
    }

    function addAlert() {
      const name = alertName.value.trim();
      const type = alertType.value;
      const sev = severity.value;
      const nType = notifyType.value;
      const target = notifyTarget.value.trim();
      const ruleText = rule.value.trim();

      if (!name) return alert("请输入告警名称");
      if (!target) return alert("请输入通知目标");

      const list = load();
      const item = {
        name,
        type,
        severity: sev,
        notifyType: nType,
        target,
        rule: ruleText,
        enabled: true
      };
      list.push(item);
      save(list);
      appendRecord(item, "成功");

      alertName.value = "";
      notifyTarget.value = "";
      rule.value = "";
      render();
    }

    addAlertBtn.addEventListener("click", addAlert);
    importConfigBtn.addEventListener("click", importMonitorConfig);
    loadSampleBtn.addEventListener("click", () => {
      monitorConfigJson.value = JSON.stringify(SAMPLE_IMPORT_JSON, null, 2);
      setImportResult("");
    });

    body.addEventListener("click", (e) => {
      const t = e.target.getAttribute("data-toggle");
      const d = e.target.getAttribute("data-delete");
      const list = load();

      if (t !== null) {
        const i = Number(t);
        if (!list[i]) return;
        list[i].enabled = list[i].enabled === false;
        appendRecord(normalizeAlert(list[i]), list[i].enabled ? "成功" : "失败");
        save(list);
        render();
        return;
      }

      if (d !== null) {
        const removed = list.splice(Number(d), 1)[0];
        if (removed) appendRecord(normalizeAlert(removed), "失败");
        save(list);
        render();
      }
    });

    render();
  </script>
</body>
</html>
