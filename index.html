<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flink Manager - Overview</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px; font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fb; color: #1f2329; }
    .container { max-width: 1000px; margin: 0 auto; }
    .nav { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .nav a { text-decoration: none; padding: 8px 12px; border-radius: 8px; border: 1px solid #d0d5dd; color: #344054; background: #fff; }
    .nav a.active { background: #1677ff; color: #fff; border-color: #1677ff; }
    .card { background: #fff; border: 1px solid #e6e8eb; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    .desc { margin: 0; color: #667085; font-size: 14px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 12px; }
    .kpi { border: 1px solid #e6e8eb; border-radius: 10px; padding: 12px; background: #fafcff; }
    .kpi-title { font-size: 12px; color: #667085; margin-bottom: 8px; }
    .kpi-value { font-size: 22px; font-weight: 700; color: #111827; }
    .refresh-hint { margin-top: 10px; font-size: 13px; color: #667085; }
    .refresh-hint.refreshing { color: #1d4ed8; }
    .refresh-hint.success { color: #166534; }
    .refresh-hint.warning { color: #92400e; }
    .refresh-hint.error { color: #991b1b; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
    th, td { border-bottom: 1px solid #eef0f3; padding: 12px 8px; text-align: left; word-break: break-all; }
    th { color: #475467; font-weight: 600; background: #fafafa; }
    .empty { color: #98a2b3; text-align: center; padding: 18px 0; }
    .btn-open { height: 34px; border: 0; border-radius: 8px; padding: 0 12px; color: #fff; background: #16a34a; cursor: pointer; }
    .btn-open:hover { background: #15803d; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; border: 1px solid #d0d5dd; }
    .tag.running { color: #166534; background: #dcfce7; border-color: #86efac; }
    .tag.stopped { color: #991b1b; background: #fee2e2; border-color: #fca5a5; }
    .tag.unknown { color: #6b7280; background: #f3f4f6; border-color: #d1d5db; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a class="active" href="./index.html">总览</a>
      <a href="./clusters.html">集群管理</a>
      <a href="./jobs.html">Job 管理</a>
      <a href="./alerts.html">告警配置</a>
    </div>

    <div class="card">
      <h1>Flink Manager 总览</h1>
      <p class="desc">展示集群与 Job 信息（只读总览）。</p>
      <div id="refreshHint" class="refresh-hint">最近刷新：未开始</div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-title">集群总数</div><div id="kpiClusterTotal" class="kpi-value">0</div></div>
        <div class="kpi"><div class="kpi-title">可访问集群数</div><div id="kpiClusterOnline" class="kpi-value">0</div></div>
        <div class="kpi"><div class="kpi-title">不可访问集群数</div><div id="kpiClusterOffline" class="kpi-value">0</div></div>
        <div class="kpi"><div class="kpi-title">监控 Job 总数</div><div id="kpiJobTotal" class="kpi-value">0</div></div>
        <div class="kpi"><div class="kpi-title">可检测 Job 数</div><div id="kpiJobDetected" class="kpi-value">0</div></div>
        <div class="kpi"><div class="kpi-title">不可检测 Job 数</div><div id="kpiJobUndetected" class="kpi-value">0</div></div>
        <div class="kpi"><div class="kpi-title">启用告警数</div><div id="kpiAlertEnabled" class="kpi-value">0</div></div>
      </div>
    </div>

    <div class="card">
      <h2 style="margin:0; font-size:18px;">集群信息</h2>
      <table>
        <thead><tr><th style="width: 22%;">名称</th><th>地址</th><th style="width: 12%;">状态</th><th style="width: 22%;">最近检测</th><th style="width: 130px;">操作</th></tr></thead>
        <tbody id="clusterBody"></tbody>
      </table>
    </div>

    <div class="card">
      <h2 style="margin:0; font-size:18px;">Job 信息</h2>
      <table>
        <thead><tr><th style="width: 22%;">Job 名称</th><th style="width: 20%;">所属集群</th><th style="width: 18%;">检测结果</th><th style="width: 15%;">实时状态</th><th>备注</th></tr></thead>
        <tbody id="jobBody"></tbody>
      </table>
    </div>
  </div>

  <script src="./data-access.js"></script>
  <script>
    const CLUSTER_KEY = "flink_clusters_v1";
    const JOB_KEY = "flink_jobs_v1";
    const DETECTED_JOB_KEY = "flink_detected_jobs_v1";
    const ALERT_KEY = "flink_alerts_v1";
    const CLUSTER_HEALTH_KEY = window.DataAccess.CLUSTER_HEALTH_KEY || "flink_cluster_health_v1";
    const FIXED_PATH = "/";
    const REFRESH_HINT_ID = "refreshHint";
    let hasAutoRefreshed = false;
    let refreshingOverview = false;

    async function load(key) {
      const value = window.DataAccess.load(key);
      if (value && typeof value.then === "function") {
        return value;
      }
      return value;
    }

    function save(key, value) {
      return window.DataAccess.save(key, value);
    }

    function normalizeBaseUrl(url) {
      return String(url || "").trim().replace(/\/+$/, "");
    }

    function formatTime(ts) {
      const value = Number(ts);
      if (!Number.isFinite(value) || value <= 0) return "";
      return new Date(value).toLocaleString("zh-CN");
    }

    function normalizeKeyPart(value) {
      return String(value || "").trim().toUpperCase();
    }

    function toJobKey(cluster, name) {
      return normalizeKeyPart(cluster) + "::" + normalizeKeyPart(name);
    }

    function setRefreshHint(status, text) {
      const el = document.getElementById(REFRESH_HINT_ID);
      if (!el) return;
      el.className = "refresh-hint " + (status || "");
      el.textContent = text || "";
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error("HTTP_" + res.status);
      }
      return res.json();
    }

    async function fetchClusterJobs(cluster) {
      const clusterName = cluster && cluster.name ? String(cluster.name) : "";
      const base = normalizeBaseUrl(cluster && cluster.url);
      if (!clusterName) throw new Error("EMPTY_CLUSTER_NAME");
      if (!base) throw new Error("EMPTY_CLUSTER_URL");

      const overview = await fetchJson(base + "/jobs/overview");
      const jobs = Array.isArray(overview && overview.jobs) ? overview.jobs : [];
      return jobs.map((job) => {
        const flinkJobId = String((job && job.jid) || "");
        const startTimestamp = Number(job && job["start-time"]);
        const status = String((job && job.state) || "").toUpperCase() || "UNKNOWN";
        return {
          name: String((job && job.name) || flinkJobId || "UNKNOWN"),
          cluster: clusterName,
          status,
          remark: "",
          flinkJobId,
          startTime: formatTime(startTimestamp),
          uptime: window.DataAccess.UNKNOWN_TEXT,
          checkpointTime: window.DataAccess.UNKNOWN_TEXT
        };
      });
    }

    async function refreshAndRender() {
      await renderKpi();
      await renderClusters();
      await renderJobs();
    }

    async function refreshAllClustersJobOverview() {
      if (refreshingOverview) return;
      refreshingOverview = true;
      try {
        const clusters = await load(CLUSTER_KEY);
        if (!clusters.length) {
          save(DETECTED_JOB_KEY, []);
          save(CLUSTER_HEALTH_KEY, {});
          await refreshAndRender();
          setRefreshHint("success", "刷新完成：当前无集群。");
          return;
        }

        setRefreshHint("refreshing", "刷新中：正在并发拉取 " + clusters.length + " 个集群的 Job...");
        const settled = await Promise.allSettled(clusters.map((cluster) => fetchClusterJobs(cluster)));
        const clusterHealthMap = {};
        const failedClusters = [];
        const successJobs = [];

        settled.forEach((item, index) => {
          const clusterName = clusters[index] && clusters[index].name ? String(clusters[index].name) : "UNKNOWN";
          if (item.status === "fulfilled") {
            clusterHealthMap[clusterName] = {
              status: "在线",
              checkedAt: Date.now(),
              error: ""
            };
            successJobs.push.apply(successJobs, item.value || []);
            return;
          }
          const reason = item.reason && item.reason.message ? String(item.reason.message) : "UNKNOWN_ERROR";
          clusterHealthMap[clusterName] = {
            status: "离线",
            checkedAt: Date.now(),
            error: reason
          };
          failedClusters.push(clusterName + " (" + reason + ")");
        });

        const successCount = clusters.length - failedClusters.length;
        save(CLUSTER_HEALTH_KEY, clusterHealthMap);
        save(DETECTED_JOB_KEY, successJobs);
        await refreshAndRender();

        if (successCount === 0) {
          setRefreshHint("error", "刷新失败：全部 " + clusters.length + " 个集群不可访问。失败详情：" + failedClusters.join("，"));
          return;
        }

        if (failedClusters.length) {
          setRefreshHint(
            "warning",
            "部分刷新完成：可访问 " + successCount + "/" + clusters.length + " 个集群；不可访问集群：" + failedClusters.join("，")
          );
          return;
        }
        setRefreshHint("success", "刷新完成：全部 " + clusters.length + " 个集群可访问。");
      } finally {
        refreshingOverview = false;
      }
    }

    async function renderKpi() {
      const clusters = await load(CLUSTER_KEY);
      const configuredJobs = await load(JOB_KEY);
      const detectedJobs = await load(DETECTED_JOB_KEY);
      const healthMap = await load(CLUSTER_HEALTH_KEY);
      const alerts = await load(ALERT_KEY);

      const online = clusters.filter((c) => healthMap && healthMap[c.name] && healthMap[c.name].status === "在线").length;
      const offline = Math.max(clusters.length - online, 0);
      const enabledAlerts = alerts.filter((a) => a && a.enabled !== false).length;
      const detectedMap = {};
      (detectedJobs || []).forEach((j) => {
        detectedMap[toJobKey(j.cluster, j.name)] = true;
      });
      const detectedCount = (configuredJobs || []).filter((j) => detectedMap[toJobKey(j.cluster, j.name)]).length;
      const undetectedCount = Math.max(configuredJobs.length - detectedCount, 0);

      document.getElementById("kpiClusterTotal").textContent = String(clusters.length);
      document.getElementById("kpiClusterOnline").textContent = String(online);
      document.getElementById("kpiClusterOffline").textContent = String(offline);
      document.getElementById("kpiJobTotal").textContent = String(configuredJobs.length);
      document.getElementById("kpiJobDetected").textContent = String(detectedCount);
      document.getElementById("kpiJobUndetected").textContent = String(undetectedCount);
      document.getElementById("kpiAlertEnabled").textContent = String(enabledAlerts);
    }

    async function renderClusters() {
      const body = document.getElementById("clusterBody");
      const list = await load(CLUSTER_KEY);
      const healthMap = await load(CLUSTER_HEALTH_KEY);
      body.innerHTML = "";
      if (!list.length) {
        body.innerHTML = '<tr><td class="empty" colspan="5">暂无集群</td></tr>';
        return;
      }
      list.forEach((item) => {
        const health = healthMap && healthMap[item.name] ? healthMap[item.name] : {};
        const status = health.status || window.DataAccess.UNKNOWN_TEXT;
        const statusCls = status === "在线" ? "running" : (status === "离线" ? "stopped" : "unknown");
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.name || ""}</td>
          <td>${item.url || ""}</td>
          <td><span class="tag ${statusCls}">${status}</span></td>
          <td>${formatTime(health.checkedAt) || "-"}</td>
          <td><button class="btn-open" data-url="${item.url || ""}">打开</button></td>
        `;
        body.appendChild(tr);
      });

      body.querySelectorAll(".btn-open").forEach((btn) => {
        btn.addEventListener("click", () => {
          const base = normalizeBaseUrl(btn.getAttribute("data-url"));
          if (!base) return;
          window.open(base + FIXED_PATH, "_blank");
        });
      });
    }

    async function renderJobs() {
      const body = document.getElementById("jobBody");
      const configuredJobs = await load(JOB_KEY);
      const detectedJobs = await load(DETECTED_JOB_KEY);
      const detectedByKey = {};
      (detectedJobs || []).forEach((item) => {
        detectedByKey[toJobKey(item.cluster, item.name)] = item;
      });
      body.innerHTML = "";
      if (!configuredJobs.length) {
        body.innerHTML = '<tr><td class="empty" colspan="5">暂无 Job</td></tr>';
        return;
      }
      configuredJobs.forEach((item) => {
        const detected = detectedByKey[toJobKey(item.cluster, item.name)];
        const detectText = detected ? "可检测" : "不可检测";
        const detectCls = detected ? "running" : "stopped";
        const status = String((detected && detected.status) || "UNKNOWN").toUpperCase();
        const statusCls = status === "RUNNING" ? "running" : (status === "UNKNOWN" ? "unknown" : "stopped");
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.name || ""}</td>
          <td>${item.cluster || ""}</td>
          <td><span class="tag ${detectCls}">${detectText}</span></td>
          <td><span class="tag ${statusCls}">${status || "UNKNOWN"}</span></td>
          <td>${item.remark || ""}</td>
        `;
        body.appendChild(tr);
      });
    }

    async function init() {
      await refreshAndRender();
      if (!hasAutoRefreshed) {
        hasAutoRefreshed = true;
        refreshAllClustersJobOverview();
      }
    }

    init();
  </script>
</body>
</html>
